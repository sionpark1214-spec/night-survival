<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>밤의 생존</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0d14;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    color: #eee; cursor: crosshair; }
  #game { display: block; position: fixed; inset: 0; }

  /* HUD */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  #topbar { position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    text-align: center; background: rgba(8,10,18,0.6); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 8px 22px; backdrop-filter: blur(4px); }
  #dayText { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
  #phaseText { font-size: 13px; margin-top: 2px; color: #ffd98a; }
  #timeText { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1.1; }

  #stats { position: absolute; top: 14px; left: 14px; display: flex; flex-direction: column; gap: 8px; }
  .statrow { display: flex; align-items: center; gap: 8px; background: rgba(8,10,18,0.55);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 10px; }
  .statrow .ico { font-size: 16px; width: 20px; text-align: center; }
  .bar { width: 160px; height: 13px; border-radius: 7px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 7px; transition: width .1s linear; }
  #tempFill { background: linear-gradient(90deg,#36c5ff,#9ff0ff); }
  #hpFill { background: linear-gradient(90deg,#ff3b5c,#ff8aa0); }
  .statval { font-size: 13px; font-weight: 700; width: 56px; }
  #money { font-size: 20px; font-weight: 800; color: #ffd76b; }

  #weaponBox { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(8,10,18,0.6); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
    padding: 8px 18px; text-align: center; min-width: 220px; }
  #wName { font-size: 18px; font-weight: 800; }
  #wAmmo { font-size: 14px; color: #9fd; margin-top: 2px; }
  #shopHint { position: absolute; bottom: 16px; right: 16px; background: rgba(20,40,80,0.7);
    border: 1px solid rgba(120,180,255,0.4); border-radius: 10px; padding: 8px 14px; font-size: 14px;
    color: #cfe3ff; display: none; }

  /* Overlays */
  .overlay { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
    background: radial-gradient(ellipse at center, rgba(12,16,28,0.82), rgba(4,6,12,0.97)); cursor: default; }
  .overlay h1 { font-size: 58px; font-weight: 900; letter-spacing: 4px; margin-bottom: 6px;
    background: linear-gradient(180deg,#cfe6ff,#5b8fd6); -webkit-background-clip: text; background-clip: text;
    color: transparent; text-shadow: 0 0 50px rgba(80,140,220,0.4); }
  .overlay h2 { font-size: 40px; font-weight: 900; margin-bottom: 10px; }
  .overlay p { font-size: 15px; color: #b9c2d2; line-height: 1.8; max-width: 460px; margin-bottom: 4px; }
  .btn { margin-top: 22px; padding: 15px 50px; font-size: 20px; font-weight: 800; border: none;
    border-radius: 14px; color: #08101e; background: linear-gradient(180deg,#bfe0ff,#5fa0e6);
    box-shadow: 0 8px 26px rgba(80,150,230,0.35); cursor: pointer; }
  .btn:active { transform: translateY(2px); }
  .keys { margin-top: 16px; font-size: 13px; color: #8090a4; line-height: 1.9; }
  [hidden] { display: none !important; }

  /* Shop */
  #shop { z-index: 25; cursor: default; }
  #shopPanel { background: linear-gradient(180deg,#161c2a,#0e1320); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px; padding: 22px 24px; width: min(560px, 92vw); max-height: 86vh; overflow-y: auto; }
  #shopPanel h2 { font-size: 24px; margin-bottom: 4px; }
  #shopMoney { font-size: 15px; color: #ffd76b; margin-bottom: 14px; }
  .gun { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; }
  .gun .ginfo { flex: 1; text-align: left; }
  .gun .gname { font-size: 16px; font-weight: 800; }
  .gun .gstat { font-size: 12px; color: #97a3b6; margin-top: 2px; }
  .gun .gbuy { padding: 9px 16px; font-size: 14px; font-weight: 800; border: none; border-radius: 9px;
    background: linear-gradient(180deg,#ffd76b,#f0b22e); color: #2a1c00; cursor: pointer; white-space: nowrap; }
  .gun .gbuy:disabled { background: #333a48; color: #6a7488; cursor: not-allowed; }
  .gun.owned { border-color: #5fd08a; }
  .gun.owned .gbuy { background: #2a6b45; color: #bff5d2; }
  #shopClose { margin-top: 10px; width: 100%; padding: 12px; font-size: 16px; font-weight: 800;
    border: none; border-radius: 12px; background: #2a3142; color: #dfe6f2; cursor: pointer; }
  #shopHint { pointer-events: auto; cursor: pointer; }

  /* Touch controls */
  #touch { position: fixed; inset: 0; z-index: 6; pointer-events: none; }
  .stick { position: absolute; pointer-events: none; display: none; }
  .stickBase, .stickKnob { position: absolute; border-radius: 50%; transform: translate(-50%,-50%); }
  .stickBase { width: 128px; height: 128px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.18); }
  .stickKnob { width: 58px; height: 58px; background: rgba(180,210,255,0.28); border: 2px solid rgba(200,225,255,0.55); }
  #aimStick .stickKnob { background: rgba(255,180,120,0.3); border-color: rgba(255,200,150,0.6); }
  .wbtn { pointer-events: auto; position: absolute; width: 64px; height: 64px; border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.18); background: rgba(12,16,26,0.7); color: #fff; font-size: 28px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .wbtn.active { border-color: #ffd76b; background: rgba(60,46,12,0.8); }
  #btnKnife { right: 90px; bottom: 96px; }
  #btnGun { right: 16px; bottom: 96px; }

  /* resources row */
  #resRow { display: flex; gap: 10px; background: rgba(8,10,18,0.55);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 10px; font-size: 14px; font-weight: 700; }
  #resRow span { white-space: nowrap; }

  /* station / context panel (bottom, non-pausing) */
  #panel { position: fixed; left: 50%; transform: translateX(-50%); bottom: 92px; z-index: 7;
    display: none; gap: 8px; max-width: 96vw; overflow-x: auto; padding: 8px; pointer-events: auto;
    background: rgba(10,13,22,0.82); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; }
  #panel.show { display: flex; }
  #panelTitle { position: fixed; left: 50%; transform: translateX(-50%); bottom: 160px; z-index: 7;
    font-size: 13px; font-weight: 800; color: #ffd98a; background: rgba(10,13,22,0.7); padding: 3px 12px;
    border-radius: 8px; display: none; }
  #panelTitle.show { display: block; }
  .sitem { flex: 0 0 auto; min-width: 96px; padding: 8px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; text-align: center; }
  .sitem b { display: block; font-size: 14px; }
  .sitem small { display: block; font-size: 11px; color: #9fb0c8; margin-top: 2px; }
  .sitem .cost { font-size: 11px; color: #ffd76b; margin-top: 2px; }
  .sitem:disabled, .sitem.dis { opacity: 0.45; cursor: not-allowed; }
  .sitem.own { border-color: #5fd08a; }

  /* big action buttons */
  .actbtn { pointer-events: auto; position: absolute; padding: 12px 18px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 800; cursor: pointer; }
  #placeBtn { bottom: 170px; left: 50%; transform: translateX(-50%); background: linear-gradient(180deg,#9ff0a8,#43c463); color: #05210e; display: none; }
  #invBtn { top: 14px; right: 14px; width: 54px; height: 54px; padding: 0; font-size: 26px;
    background: rgba(12,16,26,0.75); color: #fff; border: 2px solid rgba(255,255,255,0.18); border-radius: 14px; }

  /* inventory overlay */
  #inv { z-index: 26; }
  #invPanel { background: linear-gradient(180deg,#161c2a,#0e1320); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px; padding: 22px 24px; width: min(460px, 92vw); }
  #invPanel h2 { font-size: 22px; margin-bottom: 14px; }
  .invrow { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px;
    background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 8px; font-size: 15px; }
  .invrow button { padding: 8px 16px; border: none; border-radius: 9px; font-weight: 800; cursor: pointer;
    background: linear-gradient(180deg,#ffd76b,#f0b22e); color: #2a1c00; }
  .invrow button:disabled { background: #333a48; color: #6a7488; cursor: not-allowed; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" hidden>
  <div id="stats">
    <div class="statrow"><span class="ico">🌡️</span><div class="bar"><i id="tempFill"></i></div><span class="statval" id="tempVal">100%</span></div>
    <div class="statrow"><span class="ico">❤️</span><div class="bar"><i id="hpFill"></i></div><span class="statval" id="hpVal">100</span></div>
    <div class="statrow"><span class="ico">💰</span><span id="money">100원</span></div>
    <div id="resRow"><span>🪵 <i id="rWood">0</i></span><span>🪨 <i id="rStone">0</i></span><span>🔩 <i id="rIron">0</i></span></div>
  </div>
  <div id="topbar">
    <div id="dayText">1일차</div>
    <div id="timeText">0:20</div>
    <div id="phaseText">☀️ 낮 — 좀비를 대비해라</div>
  </div>
  <div id="weaponBox">
    <div id="wName">🔪 칼</div>
    <div id="wAmmo">근접 무기</div>
  </div>
  <div id="shopHint">🛒 총 가게 — 상인을 눌러 구매</div>
</div>

<div id="touch" hidden>
  <div class="stick" id="moveStick"><div class="stickBase"></div><div class="stickKnob"></div></div>
  <div class="stick" id="aimStick"><div class="stickBase"></div><div class="stickKnob"></div></div>
  <div class="wbtn active" id="btnKnife">🔪</div>
  <div class="wbtn" id="btnGun">🔫</div>
  <button class="actbtn" id="invBtn">🎒</button>
  <button class="actbtn" id="placeBtn">📦 설치</button>
</div>
<div id="panelTitle"></div>
<div id="panel"></div>

<div class="overlay" id="inv" hidden>
  <div id="invPanel">
    <h2>🎒 인벤토리</h2>
    <div id="invList"></div>
    <button id="invClose" style="margin-top:10px;width:100%;padding:12px;font-size:16px;font-weight:800;border:none;border-radius:12px;background:#2a3142;color:#dfe6f2;cursor:pointer;">닫기</button>
  </div>
</div>

<div class="overlay" id="title">
  <h1>밤의 생존</h1>
  <p>날이 저물면 좀비가 사방에서 몰려온다.<br>
  낮 동안 돈을 모아 총을 사고, <b>캠프파이어</b> 곁에서 온도와 체력을 채워라.<br>
  온도나 체력이 <b>0</b>이 되면 끝이다.</p>
  <div class="keys">
    <b>WASD</b> 이동 · <b>마우스</b> 조준 · <b>클릭</b> 발사 (미니건은 꾹) · <b>1</b> 칼 / <b>2</b> 총<br>
    좀비를 잡으면 돈이 들어온다 · 밤이 깊을수록 좀비는 강해진다
  </div>
  <button class="btn" id="startBtn">게임 시작</button>
</div>

<div class="overlay" id="dead" hidden>
  <h2>💀 사망</h2>
  <p id="deadMsg"></p>
  <p id="deadStats" style="color:#ffd76b;margin-top:8px;font-size:16px;"></p>
  <button class="btn" id="restartBtn">타이틀로</button>
</div>

<div class="overlay" id="shop" hidden>
  <div id="shopPanel">
    <h2>🛒 총 가게</h2>
    <div id="shopMoney">보유 금액: 100원</div>
    <div id="shopList"></div>
    <button id="shopClose">닫기 (ESC)</button>
  </div>
</div>

<script>
"use strict";
(function () {
  const cv = document.getElementById("game");
  const ctx = cv.getContext("2d");
  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + "px"; cv.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize); resize();
  const $ = (id) => document.getElementById(id);

  // ===== 2.5D projection =====
  const YSCALE = 0.62;   // vertical squash -> high-angle 3/4 view
  const WALL_H = 52;     // wall height
  const BULLET_H = 22;   // bullets fly at this height
  let camX = 0, camY = 0;
  const px = (wx) => wx - camX;
  const py = (wy, wz) => (wy - camY) * YSCALE - (wz || 0);
  function quad(ax, ay, bx, by, cx, cy, dx, dy) {
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(cx, cy); ctx.lineTo(dx, dy); ctx.closePath(); ctx.fill();
  }
  function sphere(cx, cy, r, color, white) {
    const g = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.4, r * 0.1, cx, cy, r);
    if (white) { g.addColorStop(0, "#fff"); g.addColorStop(1, "#fff"); }
    else { g.addColorStop(0, shade(color, 1.35)); g.addColorStop(0.7, color); g.addColorStop(1, shade(color, 0.65)); }
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 6.3); ctx.fill();
  }
  function shade(hex, f) {
    const n = parseInt(hex.slice(1), 16);
    let r = Math.min(255, ((n >> 16) & 255) * f) | 0;
    let g = Math.min(255, ((n >> 8) & 255) * f) | 0;
    let b = Math.min(255, (n & 255) * f) | 0;
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  // ---------- Weapons ----------
  const GUNS = [
    { id:"pistol",   name:"권총",       price:500,   dmg:10,  delay:1.0,  mag:3,        reload:5.0, auto:false },
    { id:"revolver", name:"리볼버",     price:600,   dmg:10,  delay:0.1,  mag:6,        reload:4.6, auto:false },
    { id:"smg",      name:"기관단총",   price:1000,  dmg:5,   delay:0.1,  mag:20,       reload:5.4, auto:true  },
    { id:"double",   name:"더블권총",   price:1100,  dmg:30,  delay:0.1,  mag:1,        reload:4.1, auto:false },
    { id:"shotgun",  name:"샷건",       price:2000,  dmg:35,  delay:2.5,  mag:3,        reload:7.0, auto:false, pellets:5 },
    { id:"sniper",   name:"스나이퍼",   price:3000,  dmg:100, delay:3.0,  mag:6,        reload:8.0, auto:false, pierce:true },
    { id:"energy",   name:"에너지권총", price:5000,  dmg:20,  delay:0.1,  mag:Infinity, reload:0,   auto:false },
    { id:"flame",    name:"화염방사기", price:10000, dmg:50,  delay:0.05, mag:Infinity, reload:0,   auto:true,  flame:true },
    { id:"minigun",  name:"미니건",     price:30000, dmg:100, delay:0.06, mag:300,      reload:30,  auto:true,  slow:true },
  ];
  const GUN_BY_ID = {}; GUNS.forEach(g => GUN_BY_ID[g.id] = g);
  function gunStatLine(g) {
    const mag = g.mag === Infinity ? "∞" : g.mag;
    const rl = g.reload ? `, 재장전 ${g.reload}s` : ", 재장전 없음";
    let extra = "";
    if (g.flame) extra = " · 근접 화염+화상";
    if (g.slow) extra = " · 이동 느려짐";
    if (g.pierce) extra = " · 관통";
    return `데미지 ${g.dmg} · ${g.auto?"연사":"클릭"} ${g.delay}s · ${mag}발${rl}${extra}`;
  }

  // ---------- Buildables / Hires ----------
  const TURRET_AMMO = { price: 400, amount: 200 };
  const BUILDS = [
    { id:"mine",   name:"지뢰",     iron:3, wood:0, stone:2, place:true,  desc:"밟으면 100뎀" },
    { id:"turret", name:"터렛",     iron:5, wood:0, stone:2, place:true,  desc:"자동사격 (탄약 필요)" },
    { id:"lava",   name:"용암함정", iron:1, wood:0, stone:5, place:true,  desc:"30+화상50, 1회용" },
    { id:"wall",   name:"벽",       iron:0, wood:5, stone:0, place:true,  desc:"체력 500" },
    { id:"torch",  name:"횃불",     iron:0, wood:3, stone:3, place:false, desc:"온도 천천히 감소" },
  ];
  const BUILD_BY_ID = {}; BUILDS.forEach(b => BUILD_BY_ID[b.id] = b);
  const HIRES = [
    { id:"knifeman", name:"칼든사람", price:100,  hp:20, kind:"melee", dmg:5, cd:2.0, color:"#c0c8d0" },
    { id:"police",   name:"경찰",     price:500,  hp:30, kind:"gun", gun:"pistol", color:"#3b6ea5" },
    { id:"sniper",   name:"저격수",   price:1100, hp:60, kind:"gun", gun:"sniper", color:"#2f6d3a" },
    { id:"medic",    name:"의무병",   price:1500, hp:50, kind:"medic", color:"#d05a7a" },
    { id:"miner",    name:"광부",     price:2000, hp:5,  kind:"miner", color:"#8a6a30" },
  ];
  const HIRE_BY_ID = {}; HIRES.forEach(h => HIRE_BY_ID[h.id] = h);
  const RES_COL = { wood:"#9a6a38", stone:"#8a8a8a", iron:"#b3bcc6" };

  // ---------- Zombie types ----------
  const ZT = {
    normal:  { name:"좀비",     hp:10,  spd:78,  dmgHp:1,  reward:5,   color:"#5a7a4a", r:15, since:1 },
    fast:    { name:"빠른좀비", hp:10,  spd:158, dmgHp:1,  reward:10,  color:"#7ad17a", r:13, since:3 },
    suicide: { name:"자폭좀비", hp:10,  spd:98,  dmgHp:10, reward:20,  color:"#d97a3a", r:15, since:6,  explode:true },
    poison:  { name:"독좀비",   hp:10,  spd:70,  dmgHp:10, reward:25,  color:"#7ad14a", r:16, since:15, poison:true },
    ice:     { name:"얼음좀비", hp:10,  spd:72,  dmgTemp:10,reward:30, color:"#6cc8ff", r:16, since:20, ice:true },
    split:   { name:"분열좀비", hp:10,  spd:82,  dmgHp:10, reward:30,  color:"#c86cff", r:17, since:25, split:true },
    splitling:{name:"새끼좀비", hp:5,   spd:120, dmgHp:5,  reward:0,   color:"#d9a6ff", r:9 },
    miniboss:{ name:"미니보스", hp:100, spd:56,  dmgHp:15, reward:500, color:"#b03050", r:30, boss:true },
    boss:    { name:"보스",     hp:300, spd:50,  dmgHp:20, reward:1000,color:"#7a1030", r:46, boss:true },
  };
  const NORMAL_TYPES = ["normal","fast","suicide","poison","ice","split"];

  // ---------- Config ----------
  const CFG = {
    playerSpeed: 210, playerR: 16,
    knifeRange: 50, knifeArc: 1.5, knifeDelay: 0.4, knifeDmg: 5, knifeBackstab: 10,
    tempDrain: 2, regenTemp: 10, regenHp: 10, campRadius: 110,
    dayBase: 20, dayInc: 30, night: 60,
    bulletSpeed: 820, flameRange: 130,
  };

  // ---------- World ----------
  const WORLD = 2200;
  const G = {
    state: "title", paused: false,
    day: 1, phase: "day", timer: CFG.dayBase,
    money: 100,
    player: null, houses: [], walls: [], campfire: null, seller: null,
    zombies: [], bullets: [], parts: [], pops: [], pools: [],
    spawnQueue: [], spawnTimer: 0, fleeT: 0,
    mouse: { sx: 0, sy: 0, down: false }, keys: {},
    move: { id: null, dx: 0, dy: 0, mag: 0 },
    aim: { id: null, active: false, ang: 0 },
    killCount: 0, _hoverPrev: false,
    // new systems
    res: { wood: 0, stone: 0, iron: 0 },
    ammoStock: 0,            // turret ammo in inventory
    carried: null,           // build id being carried (to place)
    inv: { torch: 0 },
    torch: 0,                // remaining torch fuel (>0 = active)
    allies: [], mines: [], turrets: [], lavas: [], placedWalls: [], warmZones: [], drops: [],
    stations: [], panelKey: "", panelCtx: null,
    allyRegenT: 20, medicFrac: 0,
  };
  function rand(a, b) { return a + Math.random() * (b - a); }

  // ---------- Houses ----------
  function makeHouse(x, y, w, h, doorSide, opts) {
    const T = 16, DG = 84;
    const house = { x, y, w, h, doorSide, ...(opts || {}) };
    const walls = [];
    const sides = {
      top:    [x, y, w, T, "h"],
      bottom: [x, y + h - T, w, T, "h"],
      left:   [x, y, T, h, "v"],
      right:  [x + w - T, y, T, h, "v"],
    };
    for (const side in sides) {
      const [rx, ry, rw, rh, dir] = sides[side];
      if (side === doorSide) {
        if (dir === "h") {
          const gapStart = rx + (rw - DG) / 2;
          walls.push({ x: rx, y: ry, w: gapStart - rx, h: rh });
          walls.push({ x: gapStart + DG, y: ry, w: rx + rw - (gapStart + DG), h: rh });
        } else {
          const gapStart = ry + (rh - DG) / 2;
          walls.push({ x: rx, y: ry, w: rw, h: gapStart - ry });
          walls.push({ x: rx, y: gapStart + DG, w: rw, h: ry + rh - (gapStart + DG) });
        }
      } else {
        walls.push({ x: rx, y: ry, w: rw, h: rh });
      }
    }
    house.walls = walls;
    return house;
  }

  function generateMap() {
    G.houses = []; G.walls = [];
    // spawn(campfire+bench) house, gun shop, hire shop
    const ch = makeHouse(-170, -160, 320, 290, "right", { hasCampfire: true });
    const gh = makeHouse(560, -150, 300, 250, "left", { hasSeller: true });
    const hh = makeHouse(-150, 420, 300, 250, "top", { hasHire: true });
    G.houses.push(ch, gh, hh);
    G.campfire = { x: ch.x + ch.w / 2 - 40, y: ch.y + ch.h / 2, r: CFG.campRadius };
    G.bench = { x: ch.x + ch.w / 2 + 70, y: ch.y + ch.h / 2 };
    G.seller = { x: gh.x + gh.w / 2, y: gh.y + gh.h / 2 - 10 };
    G.hireNpc = { x: hh.x + hh.w / 2, y: hh.y + hh.h / 2 - 10 };
    G.stations = [
      { type: "gun",   x: G.seller.x,  y: G.seller.y,  range: 150 },
      { type: "hire",  x: G.hireNpc.x, y: G.hireNpc.y, range: 150 },
      { type: "bench", x: G.bench.x,   y: G.bench.y,   range: 120 },
    ];
    for (const ho of G.houses) for (const wl of ho.walls) G.walls.push(wl);
  }

  // ---------- Collision ----------
  function resolve(o, r) {
    const lists = [G.walls, G.placedWalls];
    for (const list of lists) for (const wl of list) {
      const nx = Math.max(wl.x, Math.min(o.x, wl.x + wl.w));
      const ny = Math.max(wl.y, Math.min(o.y, wl.y + wl.h));
      let dx = o.x - nx, dy = o.y - ny;
      let d2 = dx * dx + dy * dy;
      if (d2 < r * r) {
        let d = Math.sqrt(d2);
        if (d > 0.0001) { const push = r - d; o.x += dx / d * push; o.y += dy / d * push; }
        else {
          const left = o.x - wl.x, right = wl.x + wl.w - o.x, top = o.y - wl.y, bottom = wl.y + wl.h - o.y;
          const m = Math.min(left, right, top, bottom);
          if (m === left) o.x = wl.x - r; else if (m === right) o.x = wl.x + wl.w + r;
          else if (m === top) o.y = wl.y - r; else o.y = wl.y + wl.h + r;
        }
      }
    }
    o.x = Math.max(-WORLD, Math.min(WORLD, o.x));
    o.y = Math.max(-WORLD, Math.min(WORLD, o.y));
  }

  // ---------- Start / die ----------
  function startGame() {
    G.state = "playing";
    G.day = 1; G.phase = "day"; G.timer = CFG.dayBase; G.money = 100;
    G.zombies = []; G.bullets = []; G.parts = []; G.pops = []; G.pools = [];
    G.spawnQueue = []; G.spawnTimer = 0; G.killCount = 0; G._hoverPrev = false;
    G.res = { wood: 0, stone: 0, iron: 0 }; G.ammoStock = 0; G.carried = null; G.inv = { torch: 0 }; G.torch = 0;
    G.allies = []; G.mines = []; G.turrets = []; G.lavas = []; G.placedWalls = []; G.warmZones = []; G.drops = [];
    G.panelKey = ""; G.panelCtx = null; G.allyRegenT = 20; G.medicFrac = 0;
    $("panel").className = ""; $("panelTitle").className = ""; $("placeBtn").style.display = "none"; $("inv").hidden = true;
    generateMap();
    const c = G.campfire;
    G.player = { x: c.x, y: c.y + 30, r: CFG.playerR, ang: 0, hp: 100, temp: 100,
      weapon: "knife", gun: null, ammo: 0, reloading: 0, fireCd: 0, knifeCd: 0, swing: 0, hurtFlash: 0 };
    $("title").hidden = true; $("dead").hidden = true; $("shop").hidden = true;
    $("hud").hidden = false; $("touch").hidden = false;
  }
  function die(reason) {
    G.state = "dead"; clearSticks();
    $("panel").className = ""; $("panelTitle").className = ""; $("placeBtn").style.display = "none"; $("inv").hidden = true;
    $("hud").hidden = true; $("shop").hidden = true; $("touch").hidden = true;
    $("deadMsg").textContent = reason;
    $("deadStats").textContent = `${G.day}일차까지 생존 · 좀비 ${G.killCount}마리 처치`;
    $("dead").hidden = false;
  }

  // ---------- Night spawn ----------
  function beginNight() {
    G.phase = "night"; G.timer = CFG.night;
    const day = G.day;
    const avail = NORMAL_TYPES.filter(t => day >= ZT[t].since);
    const total = Math.min(90, 6 + day * 3);
    G.spawnQueue = [];
    for (let i = 0; i < total; i++) {
      const r = Math.random();
      G.spawnQueue.push((r < 0.5 || avail.length === 1) ? "normal" : avail[(Math.random() * avail.length) | 0]);
    }
    if (day % 30 === 0) G.spawnQueue.unshift("boss");
    if (day % 5 === 0) G.spawnQueue.unshift("miniboss");
    G.spawnTimer = 0.4;
  }
  function spawnZombie(type) {
    const def = ZT[type]; const p = G.player;
    const a = Math.random() * Math.PI * 2;
    const dist = Math.max(W, H / YSCALE) / 2 + rand(120, 320);
    G.zombies.push({ type, x: p.x + Math.cos(a) * dist, y: p.y + Math.sin(a) * dist,
      hp: def.hp, max: def.hp, r: def.r, spd: def.spd, face: a + Math.PI, atkCd: 0, burn: 0, hitFlash: 0, wob: Math.random() * 6.3 });
  }

  // ---------- Input ----------
  window.addEventListener("keydown", (e) => {
    G.keys[e.key.toLowerCase()] = true;
    if (e.key === "1" && G.player) G.player.weapon = "knife";
    if (e.key === "2" && G.player && G.player.gun) G.player.weapon = "gun";
    if (e.key === "Escape" && G.state === "shopping") closeShop();
  });
  window.addEventListener("keyup", (e) => { G.keys[e.key.toLowerCase()] = false; });
  cv.addEventListener("mousemove", (e) => { G.mouse.sx = e.clientX; G.mouse.sy = e.clientY; });
  cv.addEventListener("mousedown", () => { if (G.state === "playing") { G.mouse.down = true; fireOnce(); } });
  window.addEventListener("mouseup", () => { G.mouse.down = false; });

  // ----- Touch (mobile) -----
  function showStick(id, bx, by, kx, ky) {
    const s = $(id); s.style.display = "block";
    s.querySelector(".stickBase").style.left = bx + "px"; s.querySelector(".stickBase").style.top = by + "px";
    s.querySelector(".stickKnob").style.left = kx + "px"; s.querySelector(".stickKnob").style.top = ky + "px";
  }
  function hideStick(id) { $(id).style.display = "none"; }
  function clearSticks() { G.move.id = null; G.move.mag = 0; G.aim.id = null; G.aim.active = false; hideStick("moveStick"); hideStick("aimStick"); }
  const MAXR = 58;
  function aimAngle(dx, dy) { return Math.atan2(dy / YSCALE, dx); } // unscale y for 2.5D tilt
  cv.addEventListener("touchstart", (e) => {
    if (G.state !== "playing") return;
    for (const t of e.changedTouches) {
      if (t.clientX < W / 2 && G.move.id === null) {
        G.move.id = t.identifier; G.move.sx = t.clientX; G.move.sy = t.clientY; G.move.dx = 0; G.move.dy = 0; G.move.mag = 0;
        showStick("moveStick", t.clientX, t.clientY, t.clientX, t.clientY);
      } else if (t.clientX >= W / 2 && G.aim.id === null) {
        G.aim.id = t.identifier; G.aim.sx = t.clientX; G.aim.sy = t.clientY; G.aim.active = true;
        showStick("aimStick", t.clientX, t.clientY, t.clientX, t.clientY);
      }
    }
    e.preventDefault();
  }, { passive: false });
  cv.addEventListener("touchmove", (e) => {
    for (const t of e.changedTouches) {
      if (t.identifier === G.move.id) {
        let dx = t.clientX - G.move.sx, dy = t.clientY - G.move.sy;
        const d = Math.hypot(dx, dy); if (d > MAXR) { dx = dx / d * MAXR; dy = dy / d * MAXR; }
        G.move.dx = dx / MAXR; G.move.dy = dy / MAXR; G.move.mag = Math.min(1, d / MAXR);
        showStick("moveStick", G.move.sx, G.move.sy, G.move.sx + dx, G.move.sy + dy);
      } else if (t.identifier === G.aim.id) {
        let dx = t.clientX - G.aim.sx, dy = t.clientY - G.aim.sy;
        const d = Math.hypot(dx, dy);
        if (d > 8) G.aim.ang = aimAngle(dx, dy);
        let kx = dx, ky = dy; if (d > MAXR) { kx = dx / d * MAXR; ky = dy / d * MAXR; }
        showStick("aimStick", G.aim.sx, G.aim.sy, G.aim.sx + kx, G.aim.sy + ky);
      }
    }
    e.preventDefault();
  }, { passive: false });
  function endTouch(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === G.move.id) { G.move.id = null; G.move.mag = 0; hideStick("moveStick"); }
      else if (t.identifier === G.aim.id) { G.aim.id = null; G.aim.active = false; hideStick("aimStick"); }
    }
  }
  cv.addEventListener("touchend", endTouch);
  cv.addEventListener("touchcancel", endTouch);

  // weapon buttons + shop button
  $("btnKnife").addEventListener("click", () => { if (G.player) { G.player.weapon = "knife"; syncWeaponBtns(); } });
  $("btnGun").addEventListener("click", () => { if (G.player && G.player.gun) { G.player.weapon = "gun"; syncWeaponBtns(); } });
  $("shopHint").addEventListener("click", () => { if (G.state === "playing") openShop(); });
  function syncWeaponBtns() {
    if (!G.player) return;
    $("btnKnife").classList.toggle("active", G.player.weapon === "knife");
    $("btnGun").classList.toggle("active", G.player.weapon === "gun");
  }
  function mouseWorld() {
    // invert projection: x direct, y divided by YSCALE
    return { x: G.mouse.sx + camX, y: camY + G.mouse.sy / YSCALE };
  }

  // ---------- Shop ----------
  function openShop() {
    if (G.state !== "playing") return;
    G.state = "shopping"; G.mouse.down = false;
    $("shopMoney").textContent = "보유 금액: " + G.money + "원";
    const list = $("shopList"); list.innerHTML = "";
    for (const g of GUNS) {
      const owned = G.player.gun === g.id;
      const can = G.money >= g.price && !owned;
      const row = document.createElement("div");
      row.className = "gun" + (owned ? " owned" : "");
      row.innerHTML = `<div class="ginfo"><div class="gname">${g.name} <span style="color:#ffd76b">${g.price}원</span></div>
        <div class="gstat">${gunStatLine(g)}</div></div>`;
      const btn = document.createElement("button");
      btn.className = "gbuy"; btn.textContent = owned ? "보유중" : "구매"; btn.disabled = !can;
      btn.onclick = () => buyGun(g.id);
      row.appendChild(btn); list.appendChild(row);
    }
    $("shop").hidden = false;
  }
  function buyGun(id) {
    const g = GUN_BY_ID[id];
    if (G.money < g.price || G.player.gun === id) return;
    G.money -= g.price; G.player.gun = id; G.player.weapon = "gun";
    G.player.ammo = g.mag === Infinity ? Infinity : g.mag;
    G.player.reloading = 0; G.player.fireCd = 0;
  }
  function closeShop() { if (G.state === "shopping") { G.state = "playing"; $("shop").hidden = true; } }
  $("shopClose").onclick = closeShop;

  // ---------- Firing ----------
  function startReload() {
    const g = GUN_BY_ID[G.player.gun];
    if (!g || g.reload <= 0 || g.mag === Infinity || G.player.reloading > 0) return;
    G.player.reloading = g.reload;
  }
  function getAimAngle() {
    const p = G.player;
    if (G.aim.active) return G.aim.ang;
    const mw = mouseWorld();
    return Math.atan2(mw.y - p.y, mw.x - p.x);
  }
  function fireOnce() {
    const p = G.player;
    if (p.weapon === "knife") { swingKnife(); return; }
    const g = GUN_BY_ID[p.gun]; if (!g || g.auto) return;
    shoot(g);
  }
  function shoot(g) {
    const p = G.player;
    if (p.reloading > 0 || p.fireCd > 0) return;
    if (g.mag !== Infinity && p.ammo <= 0) { startReload(); return; }
    const ang = getAimAngle(); p.ang = ang;
    if (g.flame) spawnFlame(ang, g);
    else if (g.pellets) { for (let i = 0; i < g.pellets; i++) spawnBullet(ang + rand(-0.22, 0.22), g.dmg, g); }
    else spawnBullet(ang, g.dmg, g);
    p.fireCd = g.delay;
    if (g.mag !== Infinity) { p.ammo--; if (p.ammo <= 0) startReload(); }
    G.parts.push({ x: p.x + Math.cos(ang) * 22, y: p.y + Math.sin(ang) * 22, vx: 0, vy: 0, life: 0.06, max: 0.06, r: 7, col: "#fff3b0", h: BULLET_H });
  }
  function spawnBullet(ang, dmg, g) {
    const p = G.player;
    G.bullets.push({ x: p.x + Math.cos(ang) * 22, y: p.y + Math.sin(ang) * 22,
      vx: Math.cos(ang) * CFG.bulletSpeed, vy: Math.sin(ang) * CFG.bulletSpeed,
      dmg, life: 1.1, pierce: !!g.pierce, hit: g.pierce ? [] : null, big: g.id === "sniper" || g.id === "minigun" });
  }
  function spawnFlame(ang, g) {
    const p = G.player;
    for (const z of G.zombies) {
      const dx = z.x - p.x, dy = z.y - p.y, d = Math.hypot(dx, dy);
      if (d < CFG.flameRange + z.r) {
        const za = Math.atan2(dy, dx);
        let diff = Math.abs(((za - ang + Math.PI) % (2 * Math.PI)) - Math.PI);
        if (diff < 0.5) { z.hp -= g.dmg * (1 / 60); z.burn = Math.max(z.burn, 3.0); z.hitFlash = 0.05; }
      }
    }
    for (let i = 0; i < 3; i++) {
      const a = ang + rand(-0.4, 0.4), sp = rand(180, 320);
      G.parts.push({ x: p.x + Math.cos(ang) * 20, y: p.y + Math.sin(ang) * 20, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: rand(0.2, 0.4), max: 0.4, r: rand(5, 11), col: Math.random() < 0.5 ? "#ff8a2a" : "#ffd24a", h: 18 });
    }
  }
  function swingKnife() {
    const p = G.player;
    if (p.knifeCd > 0) return;
    p.knifeCd = CFG.knifeDelay;
    const ang = getAimAngle(); p.ang = ang; p.swing = 0.18;
    for (const z of G.zombies) {
      const dx = z.x - p.x, dy = z.y - p.y, d = Math.hypot(dx, dy);
      if (d < CFG.knifeRange + z.r) {
        const za = Math.atan2(dy, dx);
        let diff = Math.abs(((za - ang + Math.PI) % (2 * Math.PI)) - Math.PI);
        if (diff < CFG.knifeArc / 2) {
          const dot = Math.cos(z.face) * (p.x - z.x) + Math.sin(z.face) * (p.y - z.y);
          damageZombie(z, dot > 0 ? CFG.knifeBackstab : CFG.knifeDmg);
        }
      }
    }
  }
  function damageZombie(z, dmg) {
    z.hp -= dmg; z.hitFlash = 0.08;
    G.pops.push({ x: z.x, y: z.y, h: z.r + 16, t: 0.6, txt: Math.round(dmg), col: "#fff" });
  }
  function killZombie(z, idx) {
    const def = ZT[z.type];
    G.money += def.reward; G.killCount++;
    if (def.reward > 0) G.pops.push({ x: z.x, y: z.y, h: 18, t: 0.9, txt: "+" + def.reward + "원", col: "#ffd76b" });
    if (Math.random() < 0.05) { const types = ["wood", "stone", "iron"]; const ty = types[(Math.random() * 3) | 0];
      G.drops.push({ x: z.x, y: z.y, type: ty, bob: Math.random() * 6.3 }); }
    for (let i = 0; i < 12; i++) { const a = Math.random() * 6.3, s = rand(40, 160);
      G.parts.push({ x: z.x, y: z.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.3, 0.6), max: 0.6, r: rand(2, 4), col: def.color, h: 14 }); }
    if (def.explode) explode(z.x, z.y, 90, 10);
    if (def.poison) G.pools.push({ x: z.x, y: z.y, r: 60, t: 5, dps: 10 });
    if (def.split) for (let i = 0; i < 2; i++) { const a = Math.random() * 6.3;
      G.zombies.push({ type: "splitling", x: z.x + Math.cos(a) * 20, y: z.y + Math.sin(a) * 20,
        hp: ZT.splitling.hp, max: ZT.splitling.hp, r: ZT.splitling.r, spd: ZT.splitling.spd, face: a, atkCd: 0, burn: 0, hitFlash: 0, wob: Math.random() * 6.3 }); }
    G.zombies.splice(idx, 1);
  }
  function explode(x, y, radius, dmg) {
    for (let i = 0; i < 22; i++) { const a = Math.random() * 6.3, s = rand(60, 240);
      G.parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.3, 0.7), max: 0.7, r: rand(3, 7), col: i % 2 ? "#ff8a2a" : "#ffd24a", h: 18 }); }
    const p = G.player;
    if (Math.hypot(p.x - x, p.y - y) < radius + p.r) hurtPlayer(dmg);
  }
  function hurtPlayer(dmg) {
    G.player.hp -= dmg; G.player.hurtFlash = 0.25;
    if (G.player.hp <= 0) { G.player.hp = 0; die("좀비에게 당했다…"); }
  }

  // ---------- Loop ----------
  let last = 0;
  function frame(ts) {
    if (!last) last = ts;
    let dt = (ts - last) / 1000; last = ts;
    if (dt > 0.05) dt = 0.05;
    if (G.state === "playing") update(dt);
    else if (G.state === "shopping") checkShopHover();
    render();
    requestAnimationFrame(frame);
  }

  function update(dt) {
    const p = G.player;
    let mx = 0, my = 0;
    if (G.keys["w"] || G.keys["arrowup"]) my -= 1;
    if (G.keys["s"] || G.keys["arrowdown"]) my += 1;
    if (G.keys["a"] || G.keys["arrowleft"]) mx -= 1;
    if (G.keys["d"] || G.keys["arrowright"]) mx += 1;
    if (G.move.mag > 0.1) { mx = G.move.dx; my = G.move.dy / YSCALE; } // touch stick (unscale y for tilt)
    let spd = CFG.playerSpeed;
    if (p.weapon === "gun" && p.gun && GUN_BY_ID[p.gun].slow) spd *= 0.55;
    if (mx || my) { const m = Math.hypot(mx, my); p.x += mx / m * spd * dt; p.y += my / m * spd * dt; }
    resolve(p, p.r);

    // aim: touch stick takes priority, else mouse
    if (G.aim.active) p.ang = G.aim.ang;
    else { const mw = mouseWorld(); p.ang = Math.atan2(mw.y - p.y, mw.x - p.x); }
    // auto-fire while aim stick held (mobile)
    if (G.aim.active) {
      if (p.weapon === "knife") swingKnife();
      else if (p.gun) shoot(GUN_BY_ID[p.gun]);
    }

    if (p.fireCd > 0) p.fireCd -= dt;
    if (p.knifeCd > 0) p.knifeCd -= dt;
    if (p.swing > 0) p.swing -= dt;
    if (p.hurtFlash > 0) p.hurtFlash -= dt;
    if (p.reloading > 0) { p.reloading -= dt; if (p.reloading <= 0) { p.reloading = 0; const g = GUN_BY_ID[p.gun]; if (g && g.mag !== Infinity) p.ammo = g.mag; } }
    if (G.mouse.down && p.weapon === "gun" && p.gun) { const g = GUN_BY_ID[p.gun]; if (g.auto) shoot(g); }

    const c = G.campfire;
    const nearFire = Math.hypot(p.x - c.x, p.y - c.y) < c.r;
    let nearWarm = false;
    for (const wz of G.warmZones) if (Math.hypot(p.x - wz.x, p.y - wz.y) < wz.r) { nearWarm = true; break; }
    if (G.torch > 0) { G.torch -= dt; if (Math.random() < 0.02 * dt) G.torch = 0; if (G.torch < 0) G.torch = 0; }
    if (nearFire) { p.temp = Math.min(100, p.temp + CFG.regenTemp * dt); p.hp = Math.min(100, p.hp + CFG.regenHp * dt); }
    else if (nearWarm) { p.temp = Math.min(100, p.temp + CFG.regenTemp * dt); }
    else { p.temp -= (G.torch > 0 ? CFG.tempDrain * 0.3 : CFG.tempDrain) * dt; }
    if (p.temp <= 0) { p.temp = 0; return die("온도가 0이 되어 얼어붙었다…"); }

    G.timer -= dt;
    if (G.phase === "day" && G.timer <= 0) beginNight();
    else if (G.phase === "night" && G.timer <= 0) { G.phase = "morning"; G.fleeT = 2.2; for (const z of G.zombies) z.flee = true; }
    if (G.phase === "morning") {
      G.fleeT -= dt;
      if (G.fleeT <= 0) {
        G.zombies = [];
        // miners deliver resources, sometimes die
        for (let i = G.allies.length - 1; i >= 0; i--) { const a = G.allies[i];
          if (a.kind === "miner") {
            if (Math.random() < 0.2) { G.pops.push({ x: a.x, y: a.y, h: 20, t: 1.2, txt: "광부 사망", col: "#ff6b8a" }); G.allies.splice(i, 1); }
            else { G.res.stone += 5; G.res.iron += 5; }
          } }
        G.day++; G.phase = "day"; G.timer = CFG.dayBase + (G.day - 1) * CFG.dayInc;
      }
    }

    if (G.phase === "night" && G.spawnQueue.length) {
      G.spawnTimer -= dt;
      if (G.spawnTimer <= 0) { spawnZombie(G.spawnQueue.shift()); G.spawnTimer = Math.max(0.25, (CFG.night * 0.7) / Math.max(1, (6 + G.day * 3))); }
    }

    for (let i = G.zombies.length - 1; i >= 0; i--) {
      const z = G.zombies[i], def = ZT[z.type];
      z.wob += dt * 5;
      if (z.hitFlash > 0) z.hitFlash -= dt;
      if (z.burn > 0) { z.burn -= dt; z.hp -= 100 * dt; }
      let tx, ty;
      if (z.flee) { tx = z.x + (z.x - p.x); ty = z.y + (z.y - p.y); } else { tx = p.x; ty = p.y; }
      let dx = tx - z.x, dy = ty - z.y; const d = Math.hypot(dx, dy) || 1; dx /= d; dy /= d;
      const sp = z.flee ? z.spd * 2.4 : z.spd;
      z.face = Math.atan2(p.y - z.y, p.x - z.x);
      z.x += dx * sp * dt; z.y += dy * sp * dt;
      if (!z.flee) resolve(z, z.r);
      if (z.atkCd > 0) z.atkCd -= dt;
      if (!z.flee && Math.hypot(p.x - z.x, p.y - z.y) < p.r + z.r) {
        if (def.explode) { explode(z.x, z.y, 90, def.dmgHp); G.zombies.splice(i, 1); continue; }
        if (z.atkCd <= 0) {
          z.atkCd = 0.7;
          if (def.dmgTemp) { p.temp -= def.dmgTemp; if (p.temp <= 0) { p.temp = 0; die("얼음좀비에게 얼어붙었다…"); } }
          if (def.dmgHp) hurtPlayer(def.dmgHp);
        }
      }
      if (z.hp <= 0) { killZombie(z, i); continue; }
    }

    for (let i = G.pools.length - 1; i >= 0; i--) {
      const pl = G.pools[i]; pl.t -= dt;
      if (pl.t <= 0) { G.pools.splice(i, 1); continue; }
      if (Math.hypot(p.x - pl.x, p.y - pl.y) < pl.r + p.r) { p.hp -= pl.dps * dt; if (p.hp <= 0) { p.hp = 0; return die("독에 중독되어 쓰러졌다…"); } }
    }

    for (let i = G.bullets.length - 1; i >= 0; i--) {
      const b = G.bullets[i];
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
      let dead = b.life <= 0;
      if (!dead) for (const wl of G.walls) if (b.x > wl.x && b.x < wl.x + wl.w && b.y > wl.y && b.y < wl.y + wl.h) { dead = true; break; }
      if (!dead) for (let j = G.zombies.length - 1; j >= 0; j--) {
        const z = G.zombies[j];
        if (Math.hypot(b.x - z.x, b.y - z.y) < z.r + 4) {
          if (b.pierce) { if (b.hit.indexOf(z) >= 0) continue; b.hit.push(z); }
          damageZombie(z, b.dmg);
          if (z.hp <= 0) killZombie(z, j);
          if (!b.pierce) { dead = true; break; }
        }
      }
      if (dead) G.bullets.splice(i, 1);
    }

    for (let i = G.parts.length - 1; i >= 0; i--) {
      const q = G.parts[i]; q.life -= dt;
      if (q.life <= 0) { G.parts.splice(i, 1); continue; }
      q.x += q.vx * dt; q.y += q.vy * dt; q.vx *= 0.94; q.vy *= 0.94;
    }
    for (let i = G.pops.length - 1; i >= 0; i--) { const q = G.pops[i]; q.t -= dt; q.h += 26 * dt; if (q.t <= 0) G.pops.splice(i, 1); }

    updateDrops(dt);
    updateAllies(dt);
    updateStructures(dt);
    updatePanel();
    refreshPanelAfford();
    updateHUD();
  }

  function checkShopHover() {
    const s = G.seller; if (!s || !G.player) return;
    const sx = px(s.x), sy = py(s.y, 36);
    const near = Math.hypot(G.player.x - s.x, G.player.y - s.y) < 180;
    const hover = Math.hypot(G.mouse.sx - sx, G.mouse.sy - sy) < 44;
    $("shopHint").style.display = (near && G.state === "playing") ? "block" : "none";
    if (near && hover && !G._hoverPrev && G.state === "playing") openShop();
    G._hoverPrev = near && hover;
  }

  function updateHUD() {
    const p = G.player;
    $("tempFill").style.width = p.temp + "%"; $("tempVal").textContent = Math.ceil(p.temp) + "%";
    $("hpFill").style.width = p.hp + "%"; $("hpVal").textContent = Math.ceil(p.hp);
    $("money").textContent = G.money + "원";
    $("dayText").textContent = G.day + "일차";
    const t = Math.max(0, G.timer), mm = Math.floor(t / 60), ss = Math.floor(t % 60);
    $("timeText").textContent = mm + ":" + String(ss).padStart(2, "0");
    let ph = "☀️ 낮 — 좀비를 대비해라";
    if (G.phase === "night") ph = "🌙 밤 — 좀비 출현!";
    else if (G.phase === "morning") ph = "🌅 아침 — 좀비가 도망친다";
    $("phaseText").textContent = ph;
    if (p.weapon === "knife") { $("wName").textContent = "🔪 칼"; $("wAmmo").textContent = "근접 무기 (데미지 5 / 백스탭 10)"; }
    else {
      const g = GUN_BY_ID[p.gun]; $("wName").textContent = "🔫 " + g.name;
      if (p.reloading > 0) $("wAmmo").textContent = "재장전… " + p.reloading.toFixed(1) + "s";
      else if (g.mag === Infinity) $("wAmmo").textContent = "탄약 ∞";
      else $("wAmmo").textContent = "탄약 " + p.ammo + " / " + g.mag;
    }
    $("rWood").textContent = G.res.wood; $("rStone").textContent = G.res.stone; $("rIron").textContent = G.res.iron;
    const pb = $("placeBtn");
    if (G.carried) { pb.style.display = "block"; pb.textContent = "📦 " + BUILD_BY_ID[G.carried].name + " 설치"; }
    else pb.style.display = "none";
    syncWeaponBtns();
  }

  // ================= RENDER (2.5D) =================
  function render() {
    ctx.clearRect(0, 0, W, H);
    if (G.state === "title" || !G.player) { ctx.fillStyle = "#0a0d14"; ctx.fillRect(0, 0, W, H); return; }
    const p = G.player;
    camX = p.x - W / 2;
    camY = p.y - (H / 2) / YSCALE;
    const isNight = G.phase === "night";

    // sky/ground base
    ctx.fillStyle = isNight ? "#070a12" : "#202b40";
    ctx.fillRect(0, 0, W, H);

    // ground grid (flat z=0)
    const wxMin = camX, wxMax = camX + W, wyMin = camY, wyMax = camY + H / YSCALE;
    const step = 64;
    ctx.fillStyle = isNight ? "rgba(120,140,180,0.05)" : "rgba(255,255,255,0.05)";
    for (let x = Math.floor(wxMin / step) * step; x < wxMax + step; x += step)
      for (let y = Math.floor(wyMin / step) * step; y < wyMax + step; y += step)
        ctx.fillRect(px(x), py(y, 0), 2, 2 * YSCALE);

    // world border (ground)
    ctx.strokeStyle = "rgba(120,140,200,0.25)"; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(px(-WORLD), py(-WORLD, 0)); ctx.lineTo(px(WORLD), py(-WORLD, 0));
    ctx.lineTo(px(WORLD), py(WORLD, 0)); ctx.lineTo(px(-WORLD), py(WORLD, 0)); ctx.closePath(); ctx.stroke();

    // house floors
    for (const ho of G.houses) {
      ctx.fillStyle = ho.hasCampfire ? "rgba(80,55,38,0.85)" : "rgba(36,52,74,0.85)";
      quad(px(ho.x), py(ho.y, 0), px(ho.x + ho.w), py(ho.y, 0), px(ho.x + ho.w), py(ho.y + ho.h, 0), px(ho.x), py(ho.y + ho.h, 0));
    }
    // poison pools (ground)
    for (const pl of G.pools) {
      ctx.globalAlpha = Math.min(1, pl.t / 2) * 0.5; ctx.fillStyle = "#6abf2a";
      ctx.beginPath(); ctx.ellipse(px(pl.x), py(pl.y, 0), pl.r, pl.r * YSCALE, 0, 0, 6.3); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // campfire light ring on ground
    const c = G.campfire;
    ctx.strokeStyle = "rgba(255,170,80,0.22)"; ctx.setLineDash([10, 8]); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(px(c.x), py(c.y, 0), c.r, c.r * YSCALE, 0, 0, 6.3); ctx.stroke(); ctx.setLineDash([]);

    // ground extras
    for (const wz of G.warmZones) drawWarmZone(wz);
    for (const l of G.lavas) drawLava(l);
    for (const m of G.mines) drawMine(m);
    for (const d of G.drops) drawDrop(d);
    drawPlacePreview();

    // ground shadows for actors (drawn before tall objects)
    drawShadow(p.x, p.y, p.r);
    for (const z of G.zombies) drawShadow(z.x, z.y, z.r);
    for (const a of G.allies) drawShadow(a.x, a.y, a.r);
    for (const t of G.turrets) drawShadow(t.x, t.y, 13);
    drawShadow(c.x, c.y, 22);
    if (G.seller) drawShadow(G.seller.x, G.seller.y, 14);
    if (G.hireNpc) drawShadow(G.hireNpc.x, G.hireNpc.y, 14);

    // ---- depth-sorted tall objects ----
    const items = [];
    for (const wl of G.walls) items.push({ k: "wall", o: wl, sy: wl.y + wl.h });
    for (const wl of G.placedWalls) items.push({ k: "pwall", o: wl, sy: wl.y + wl.h });
    for (const z of G.zombies) items.push({ k: "zombie", o: z, sy: z.y });
    for (const a of G.allies) items.push({ k: "ally", o: a, sy: a.y });
    for (const t of G.turrets) items.push({ k: "turret", o: t, sy: t.y });
    items.push({ k: "campfire", o: c, sy: c.y });
    if (G.bench) items.push({ k: "bench", o: G.bench, sy: G.bench.y });
    if (G.seller) items.push({ k: "seller", o: G.seller, sy: G.seller.y });
    if (G.hireNpc) items.push({ k: "hire", o: G.hireNpc, sy: G.hireNpc.y });
    items.push({ k: "player", o: p, sy: p.y });
    items.sort((a, b) => a.sy - b.sy);
    for (const it of items) {
      if (it.k === "wall") drawWall(it.o);
      else if (it.k === "pwall") drawPlacedWall(it.o);
      else if (it.k === "zombie") drawZombie(it.o);
      else if (it.k === "ally") drawAlly(it.o);
      else if (it.k === "turret") drawTurret(it.o);
      else if (it.k === "campfire") drawCampfire(it.o);
      else if (it.k === "bench") drawBench(it.o);
      else if (it.k === "seller") drawSeller(it.o);
      else if (it.k === "hire") drawHireNpc(it.o);
      else if (it.k === "player") drawPlayer(it.o);
    }

    // bullets (flying)
    for (const b of G.bullets) {
      ctx.fillStyle = b.big ? "#9fe8ff" : "#ffe27a";
      ctx.beginPath(); ctx.arc(px(b.x), py(b.y, BULLET_H), b.big ? 5 : 3.2, 0, 6.3); ctx.fill();
    }
    // particles
    for (const q of G.parts) {
      ctx.globalAlpha = Math.max(0, q.life / q.max); ctx.fillStyle = q.col;
      ctx.beginPath(); ctx.arc(px(q.x), py(q.y, q.h || 12), q.r, 0, 6.3); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // pops
    ctx.textAlign = "center"; ctx.font = "bold 15px sans-serif";
    for (const q of G.pops) { ctx.globalAlpha = Math.max(0, q.t); ctx.fillStyle = q.col; ctx.fillText(q.txt, px(q.x), py(q.y, q.h)); }
    ctx.globalAlpha = 1;

    if (isNight) drawDarkness();
    if (p.hurtFlash > 0) { ctx.fillStyle = "rgba(255,40,60," + (p.hurtFlash * 0.6) + ")"; ctx.fillRect(0, 0, W, H); }
  }

  function drawShadow(wx, wy, r) {
    ctx.fillStyle = "rgba(0,0,0,0.32)";
    ctx.beginPath(); ctx.ellipse(px(wx), py(wy, 0), r * 0.95, r * 0.5, 0, 0, 6.3); ctx.fill();
  }

  function drawWall(wl) {
    const x1 = wl.x, y1 = wl.y, x2 = wl.x + wl.w, y2 = wl.y + wl.h, h = WALL_H;
    // west face
    ctx.fillStyle = "#262d3c"; quad(px(x1), py(y1, h), px(x1), py(y2, h), px(x1), py(y2, 0), px(x1), py(y1, 0));
    // east face
    ctx.fillStyle = "#202636"; quad(px(x2), py(y1, h), px(x2), py(y2, h), px(x2), py(y2, 0), px(x2), py(y1, 0));
    // south (front) face
    ctx.fillStyle = "#161b28"; quad(px(x1), py(y2, h), px(x2), py(y2, h), px(x2), py(y2, 0), px(x1), py(y2, 0));
    // top face
    ctx.fillStyle = "#46566f"; quad(px(x1), py(y1, h), px(x2), py(y1, h), px(x2), py(y2, h), px(x1), py(y2, h));
    // top edge highlight
    ctx.strokeStyle = "rgba(255,255,255,0.12)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(px(x1), py(y1, h)); ctx.lineTo(px(x2), py(y1, h)); ctx.stroke();
  }

  function drawCampfire(c) {
    const t = performance.now() / 1000;
    const g = ctx.createRadialGradient(px(c.x), py(c.y, 14), 4, px(c.x), py(c.y, 14), 70);
    g.addColorStop(0, "rgba(255,180,90,0.55)"); g.addColorStop(1, "rgba(255,180,90,0)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px(c.x), py(c.y, 14), 70, 0, 6.3); ctx.fill();
    // logs
    ctx.fillStyle = "#3a2410"; ctx.save(); ctx.translate(px(c.x), py(c.y, 0));
    ctx.scale(1, YSCALE); ctx.rotate(0.4); ctx.fillRect(-20, -4, 40, 8); ctx.rotate(-0.9); ctx.fillRect(-20, -4, 40, 8); ctx.restore();
    // flames
    for (let i = 0; i < 3; i++) {
      const fh = 26 + i * 6 + Math.sin(t * 9 + i) * 3, wob = Math.sin(t * 7 + i * 2) * 4;
      const bx = px(c.x), by = py(c.y, 6);
      ctx.fillStyle = i === 0 ? "#ffe07a" : i === 1 ? "#ff9a32" : "#ff5a1f";
      ctx.beginPath(); ctx.moveTo(bx - (9 - i * 2.4), by);
      ctx.quadraticCurveTo(bx + wob, by - fh, bx + (9 - i * 2.4), by); ctx.fill();
    }
  }

  function drawSeller(s) {
    const t = performance.now() / 1000;
    const cx = px(s.x), gy = py(s.y, 0);
    ctx.fillStyle = "rgba(120,180,255,0.22)"; ctx.beginPath(); ctx.arc(cx, gy - 14, 24 + Math.sin(t * 3) * 3, 0, 6.3); ctx.fill();
    sphere(cx, gy - 14, 13, "#3b6ea5");       // body
    sphere(cx, gy - 30, 9, "#e8c79a");        // head
    ctx.fillStyle = "#fff"; ctx.font = "16px sans-serif"; ctx.textAlign = "center"; ctx.fillText("🔫", cx, gy - 42);
  }

  function drawZombie(z) {
    const def = ZT[z.type];
    const cx = px(z.x), gy = py(z.y, 0), by = gy - z.r;
    if (z.burn > 0) { ctx.fillStyle = "rgba(255,140,40,0.6)"; ctx.beginPath(); ctx.arc(cx, by, z.r + 4, 0, 6.3); ctx.fill(); }
    sphere(cx, by, z.r, def.color, z.hitFlash > 0);
    // eyes toward player
    const ex = Math.cos(z.face) * z.r * 0.4, ey = Math.sin(z.face) * z.r * 0.4 * YSCALE;
    ctx.fillStyle = def.boss ? "#ffd24a" : "#ff3b4a";
    ctx.beginPath(); ctx.arc(cx + ex - 3, by + ey, 2.5, 0, 6.3); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + ex + 3, by + ey, 2.5, 0, 6.3); ctx.fill();
    if (z.hp < z.max) {
      const w = Math.max(24, z.r * 1.8);
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(cx - w / 2, by - z.r - 12, w, 4);
      ctx.fillStyle = "#ff4d6a"; ctx.fillRect(cx - w / 2, by - z.r - 12, w * (z.hp / z.max), 4);
    }
    if (def.boss) { ctx.fillStyle = "#ffd24a"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center"; ctx.fillText(def.name, cx, by - z.r - 18); }
  }

  function drawPlayer(p) {
    const cx = px(p.x), gy = py(p.y, 0), by = gy - p.r;
    // weapon arm
    const len = p.weapon === "knife" ? (p.r + 18) : (p.r + 16);
    let aim = p.ang;
    if (p.weapon === "knife" && p.swing > 0) aim += (1 - p.swing / 0.18) * 0.8 - 0.4;
    const ex = cx + Math.cos(aim) * len, ey = by + Math.sin(aim) * len * YSCALE;
    ctx.strokeStyle = p.weapon === "knife" ? "#cfd6e0" : "#2a2f3a";
    ctx.lineWidth = p.weapon === "knife" ? 4 : 7; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(cx, by); ctx.lineTo(ex, ey); ctx.stroke();
    // body
    sphere(cx, by, p.r, p.hurtFlash > 0 ? "#ffb0b0" : "#ffd98a");
    // eyes toward aim
    const fx = Math.cos(p.ang) * p.r * 0.45, fy = Math.sin(p.ang) * p.r * 0.45 * YSCALE;
    ctx.fillStyle = "#1a1020";
    ctx.beginPath(); ctx.arc(cx + fx - 3, by + fy, 2.3, 0, 6.3); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + fx + 3, by + fy, 2.3, 0, 6.3); ctx.fill();
  }

  function drawDarkness() {
    const p = G.player, c = G.campfire;
    const psx = px(p.x), psy = py(p.y, 0) - p.r, fsx = px(c.x), fsy = py(c.y, 0) - 6;
    ctx.save();
    ctx.fillStyle = "rgba(2,4,10,0.8)"; ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = "destination-out";
    let pg = ctx.createRadialGradient(psx, psy, 20, psx, psy, 250);
    pg.addColorStop(0, "rgba(0,0,0,0.95)"); pg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(psx, psy, 250, 0, 6.3); ctx.fill();
    let fg = ctx.createRadialGradient(fsx, fsy, 20, fsx, fsy, c.r + 120);
    fg.addColorStop(0, "rgba(0,0,0,1)"); fg.addColorStop(0.7, "rgba(0,0,0,0.6)"); fg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(fsx, fsy, c.r + 120, 0, 6.3); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.globalCompositeOperation = "soft-light";
    let wg = ctx.createRadialGradient(fsx, fsy, 10, fsx, fsy, c.r + 80);
    wg.addColorStop(0, "rgba(255,160,60,0.5)"); wg.addColorStop(1, "rgba(255,160,60,0)");
    ctx.fillStyle = wg; ctx.beginPath(); ctx.arc(fsx, fsy, c.r + 80, 0, 6.3); ctx.fill();
    ctx.restore();
  }

  // ================= NEW SYSTEMS =================
  function killByRef(z) { const idx = G.zombies.indexOf(z); if (idx >= 0) killZombie(z, idx); }

  // ----- drops / resources -----
  function updateDrops(dt) {
    const p = G.player;
    for (let i = G.drops.length - 1; i >= 0; i--) {
      const d = G.drops[i]; d.bob += dt * 4;
      if (Math.hypot(p.x - d.x, p.y - d.y) < p.r + 16) {
        G.res[d.type]++;
        G.pops.push({ x: d.x, y: d.y, h: 22, t: 0.8, txt: "+1", col: RES_COL[d.type] });
        G.drops.splice(i, 1);
      }
    }
  }

  // ----- allies -----
  function nearestZombie(x, y, range) {
    let best = null, bd = range;
    for (const z of G.zombies) { if (z.flee) continue; const d = Math.hypot(z.x - x, z.y - y); if (d < bd) { bd = d; best = z; } }
    return best;
  }
  function updateAllies(dt) {
    const p = G.player;
    G.allyRegenT -= dt; let regen = false;
    if (G.allyRegenT <= 0) { G.allyRegenT = 20; regen = true; }
    for (let i = G.allies.length - 1; i >= 0; i--) {
      const a = G.allies[i];
      if (regen) a.hp = Math.min(a.max, a.hp + 15);
      if (a.cd > 0) a.cd -= dt;
      if (a.hurtCd > 0) a.hurtCd -= dt;
      if (a.kind === "medic") {
        G.medicFrac += dt;
        while (G.medicFrac >= 1) { G.medicFrac -= 1; p.hp = Math.min(100, p.hp + 1); for (const b of G.allies) b.hp = Math.min(b.max, b.hp + 1); }
      }
      const z = (a.kind === "melee" || a.kind === "gun") ? nearestZombie(a.x, a.y, 320) : null;
      if (z) {
        a.face = Math.atan2(z.y - a.y, z.x - a.x);
        const d = Math.hypot(z.x - a.x, z.y - a.y);
        if (a.kind === "melee") {
          if (d > a.r + z.r + 2) { a.x += Math.cos(a.face) * 150 * dt; a.y += Math.sin(a.face) * 150 * dt; }
          else if (a.cd <= 0) { a.cd = a.cdTime; damageZombie(z, a.dmg); killByRef(z); }
        } else {
          const g = GUN_BY_ID[a.gun];
          if (d > 250) { a.x += Math.cos(a.face) * 120 * dt; a.y += Math.sin(a.face) * 120 * dt; }
          if (a.cd <= 0) { a.cd = g.delay < 0.3 ? 0.5 : g.delay;
            G.bullets.push({ x: a.x + Math.cos(a.face) * 14, y: a.y + Math.sin(a.face) * 14,
              vx: Math.cos(a.face) * CFG.bulletSpeed, vy: Math.sin(a.face) * CFG.bulletSpeed,
              dmg: g.dmg, life: 1.0, pierce: !!g.pierce, hit: g.pierce ? [] : null, big: g.id === "sniper" }); }
        }
      } else {
        const fd = Math.hypot(p.x - a.x, p.y - a.y);
        if (fd > 72) { const fa = Math.atan2(p.y - a.y, p.x - a.x); a.face = fa; a.x += Math.cos(fa) * 150 * dt; a.y += Math.sin(fa) * 150 * dt; }
      }
      resolve(a, a.r);
      for (const z2 of G.zombies) { if (z2.flee) continue;
        if (Math.hypot(z2.x - a.x, z2.y - a.y) < a.r + z2.r && a.hurtCd <= 0) { a.hurtCd = 0.7; a.hp -= (ZT[z2.type].dmgHp || 1); } }
      if (a.hp <= 0) { G.pops.push({ x: a.x, y: a.y, h: 20, t: 1.0, txt: a.name + " 사망", col: "#ff6b8a" }); G.allies.splice(i, 1); }
    }
  }

  // ----- structures -----
  function updateStructures(dt) {
    // mines
    for (let i = G.mines.length - 1; i >= 0; i--) {
      const m = G.mines[i]; let hit = false;
      for (const z of G.zombies) { if (!z.flee && Math.hypot(z.x - m.x, z.y - m.y) < m.r + z.r) { hit = true; break; } }
      if (hit) {
        for (let j = G.zombies.length - 1; j >= 0; j--) { const z = G.zombies[j];
          if (Math.hypot(z.x - m.x, z.y - m.y) < 90 + z.r) { damageZombie(z, 100); if (z.hp <= 0) killZombie(z, j); } }
        for (let k = 0; k < 22; k++) { const a = Math.random() * 6.3, s = rand(60, 240);
          G.parts.push({ x: m.x, y: m.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.3, 0.7), max: 0.7, r: rand(3, 7), col: k % 2 ? "#ff8a2a" : "#ffd24a", h: 16 }); }
        G.mines.splice(i, 1);
      }
    }
    // turrets
    for (const t of G.turrets) {
      if (t.cd > 0) t.cd -= dt;
      if (t.ammo > 0 && t.cd <= 0) {
        const z = nearestZombie(t.x, t.y, t.range);
        if (z) { const ang = Math.atan2(z.y - t.y, z.x - t.x); t.cd = 0.1; t.ammo--; t.face = ang;
          G.bullets.push({ x: t.x + Math.cos(ang) * 14, y: t.y + Math.sin(ang) * 14,
            vx: Math.cos(ang) * CFG.bulletSpeed, vy: Math.sin(ang) * CFG.bulletSpeed, dmg: 3, life: 1.0, pierce: false, hit: null, big: false }); }
      }
    }
    // lava traps (1회용)
    for (let i = G.lavas.length - 1; i >= 0; i--) {
      const l = G.lavas[i]; let hit = false;
      for (const z of G.zombies) { if (!z.flee && Math.hypot(z.x - l.x, z.y - l.y) < l.r + z.r) { hit = true; break; } }
      if (hit) {
        for (let j = G.zombies.length - 1; j >= 0; j--) { const z = G.zombies[j];
          if (Math.hypot(z.x - l.x, z.y - l.y) < l.r + 30 + z.r) {
            if (ZT[z.type].ice) z.hp = 0; else { damageZombie(z, 30); z.burn = Math.max(z.burn, 0.5); }
            if (z.hp <= 0) killZombie(z, j); } }
        G.warmZones.push({ x: l.x, y: l.y, r: 90, t: 30 });
        for (let k = 0; k < 24; k++) { const a = Math.random() * 6.3, s = rand(40, 210);
          G.parts.push({ x: l.x, y: l.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.4, 0.9), max: 0.9, r: rand(4, 9), col: Math.random() < 0.5 ? "#ff6a1a" : "#ffcf4a", h: 14 }); }
        G.lavas.splice(i, 1);
      }
    }
    for (let i = G.warmZones.length - 1; i >= 0; i--) { G.warmZones[i].t -= dt; if (G.warmZones[i].t <= 0) G.warmZones.splice(i, 1); }
    // placed walls damaged by adjacent zombies
    for (let i = G.placedWalls.length - 1; i >= 0; i--) {
      const w = G.placedWalls[i]; let touching = 0;
      for (const z of G.zombies) { if (z.flee) continue;
        const nx = Math.max(w.x, Math.min(z.x, w.x + w.w)), ny = Math.max(w.y, Math.min(z.y, w.y + w.h));
        if (Math.hypot(z.x - nx, z.y - ny) < z.r + 6) touching++; }
      if (touching) w.hp -= touching * 6 * dt;
      if (w.hp <= 0) G.placedWalls.splice(i, 1);
    }
  }

  // ----- craft / place / hire / buy -----
  function canAffordRes(b) { return G.res.iron >= b.iron && G.res.wood >= b.wood && G.res.stone >= b.stone; }
  function craftBuild(id) {
    const b = BUILD_BY_ID[id]; if (!canAffordRes(b)) return;
    if (b.place && G.carried) return;
    G.res.iron -= b.iron; G.res.wood -= b.wood; G.res.stone -= b.stone;
    if (b.place) G.carried = id; else G.inv.torch++;
  }
  function placeCarried() {
    if (!G.carried) return;
    const p = G.player, id = G.carried, fx = p.x + Math.cos(p.ang) * 50, fy = p.y + Math.sin(p.ang) * 50;
    if (id === "mine") G.mines.push({ x: fx, y: fy, r: 16, blink: 0 });
    else if (id === "turret") G.turrets.push({ x: fx, y: fy, ammo: 0, cd: 0, range: 300, face: p.ang });
    else if (id === "lava") G.lavas.push({ x: fx, y: fy, r: 36 });
    else if (id === "wall") G.placedWalls.push({ x: fx - 34, y: fy - 34, w: 68, h: 68, hp: 500, max: 500 });
    G.carried = null;
  }
  function hirePerson(id) {
    const h = HIRE_BY_ID[id]; if (G.money < h.price || G.allies.length >= 30) return;
    G.money -= h.price; const p = G.player, a = rand(0, 6.3);
    G.allies.push({ id, kind: h.kind, name: h.name, color: h.color, gun: h.gun, dmg: h.dmg || 0, cdTime: h.cd || 0,
      x: p.x + Math.cos(a) * 36, y: p.y + Math.sin(a) * 36, r: 12, hp: h.hp, max: h.hp, cd: 0, hurtCd: 0, face: 0 });
  }
  function buyTurretAmmo() { if (G.money < TURRET_AMMO.price) return; G.money -= TURRET_AMMO.price; G.ammoStock += TURRET_AMMO.amount; }
  function refillTurret(t) { if (!t) return; const amt = Math.min(G.ammoStock, 200); t.ammo += amt; G.ammoStock -= amt; }
  function repairWall(w) { if (!w || G.res.wood <= 0 || w.hp >= w.max) return; G.res.wood--; w.hp = Math.min(w.max, w.hp + 100); }

  // ----- context panel -----
  function nearestStation() { const p = G.player; let best = null, bd = Infinity;
    for (const s of G.stations) { const d = Math.hypot(p.x - s.x, p.y - s.y); if (d < s.range && d < bd) { bd = d; best = s; } } return best; }
  function nearestTurretObj() { const p = G.player; let best = null, bd = 90;
    for (const t of G.turrets) { const d = Math.hypot(p.x - t.x, p.y - t.y); if (d < bd) { bd = d; best = t; } } return best; }
  function nearestDamagedWall() { const p = G.player; let best = null, bd = 90;
    for (const w of G.placedWalls) { if (w.hp >= w.max) continue; const cx = w.x + w.w / 2, cy = w.y + w.h / 2;
      const d = Math.hypot(p.x - cx, p.y - cy); if (d < bd) { bd = d; best = w; } } return best; }
  function updatePanel() {
    if (G.state !== "playing") return;
    let ctx2 = null, key = "";
    const st = nearestStation();
    if (st) { ctx2 = { kind: "station", t: st.type }; key = "station:" + st.type; }
    else { const tu = nearestTurretObj(); if (tu) { ctx2 = { kind: "turret", t: tu }; key = "turret"; }
      else { const wl = nearestDamagedWall(); if (wl) { ctx2 = { kind: "wall", t: wl }; key = "wall"; } } }
    if (key !== G.panelKey) { G.panelKey = key; G.panelCtx = ctx2; buildPanel(ctx2); }
    else if (ctx2) { G.panelCtx = ctx2; }
  }
  function buildPanel(ctx2) {
    const panel = $("panel"), title = $("panelTitle"); panel.innerHTML = ""; G._pbtns = [];
    if (!ctx2) { panel.className = ""; title.className = ""; return; }
    function mk(label, sub, cost, enFn, onClick) {
      const b = document.createElement("button"); b.className = "sitem";
      b.innerHTML = `<b>${label}</b>${sub ? `<small>${sub}</small>` : ""}${cost ? `<span class="cost">${cost}</span>` : ""}`;
      b.onclick = onClick; panel.appendChild(b); G._pbtns.push({ el: b, en: enFn }); return b;
    }
    if (ctx2.kind === "station" && ctx2.t === "gun") {
      title.textContent = "🛒 총 가게";
      for (const g of GUNS) mk(g.name, "데미지 " + g.dmg, g.price + "원", () => G.money >= g.price && G.player.gun !== g.id, () => buyGun(g.id));
      mk("터렛 탄약", TURRET_AMMO.amount + "발", TURRET_AMMO.price + "원", () => G.money >= TURRET_AMMO.price, () => buyTurretAmmo());
    } else if (ctx2.kind === "station" && ctx2.t === "hire") {
      title.textContent = "🧑 고용 (" + G.allies.length + "/30)";
      for (const h of HIRES) mk(h.name, "체력 " + h.hp, h.price + "원", () => G.money >= h.price && G.allies.length < 30, () => { hirePerson(h.id); buildPanel(G.panelCtx); });
    } else if (ctx2.kind === "station" && ctx2.t === "bench") {
      title.textContent = "🛠️ 분쇄작업대";
      for (const b of BUILDS) { const cost = [b.wood ? "🪵" + b.wood : "", b.stone ? "🪨" + b.stone : "", b.iron ? "🔩" + b.iron : ""].filter(Boolean).join(" ");
        mk(b.name, b.desc, cost, () => canAffordRes(b) && !(b.place && G.carried), () => craftBuild(b.id)); }
    } else if (ctx2.kind === "turret") {
      title.textContent = "🔧 터렛 채우기";
      mk("채우기", "보유탄약", "+200", () => G.ammoStock > 0, () => refillTurret(G.panelCtx && G.panelCtx.t));
    } else if (ctx2.kind === "wall") {
      title.textContent = "🧱 벽 수리";
      mk("수리", "나무 1개", "+100", () => G.res.wood > 0, () => repairWall(G.panelCtx && G.panelCtx.t));
    }
    panel.className = "show"; title.className = "show";
  }
  function refreshPanelAfford() {
    if (!G._pbtns) return;
    for (const pb of G._pbtns) { const ok = pb.en(); pb.el.disabled = !ok; pb.el.classList.toggle("dis", !ok); }
  }

  // ----- inventory -----
  function openInv() { if (G.state !== "playing") return; G.state = "inventory"; G.mouse.down = false; clearSticks(); buildInv(); $("inv").hidden = false; }
  function buildInv() {
    const list = $("invList"); list.innerHTML = "";
    const rows = [["🪵 나무", G.res.wood], ["🪨 돌", G.res.stone], ["🔩 철", G.res.iron], ["🔫 터렛 탄약", G.ammoStock]];
    for (const [n, v] of rows) { const r = document.createElement("div"); r.className = "invrow"; r.innerHTML = `<span>${n}</span><b>${v}</b>`; list.appendChild(r); }
    const tr = document.createElement("div"); tr.className = "invrow";
    tr.innerHTML = `<span>🔥 횃불 ×${G.inv.torch}${G.torch > 0 ? " (사용중 " + Math.ceil(G.torch) + "s)" : ""}</span>`;
    const tb = document.createElement("button"); tb.textContent = "들기"; tb.disabled = !(G.inv.torch > 0 && G.torch <= 0);
    tb.onclick = () => { if (G.inv.torch > 0 && G.torch <= 0) { G.inv.torch--; G.torch = 30; buildInv(); } };
    tr.appendChild(tb); list.appendChild(tr);
  }
  function closeInv() { if (G.state === "inventory") { G.state = "playing"; $("inv").hidden = true; } }
  $("invBtn").onclick = openInv; $("invClose").onclick = closeInv;
  $("placeBtn").onclick = placeCarried;

  // ----- draws for new entities -----
  function drawDrop(d) {
    const yo = Math.sin(d.bob) * 3, cx = px(d.x), gy = py(d.y, 0);
    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(cx, gy, 9, 5, 0, 0, 6.3); ctx.fill();
    ctx.fillStyle = RES_COL[d.type]; const yy = gy - 14 + yo;
    ctx.fillRect(cx - 7, yy - 7, 14, 14);
    ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 1.5; ctx.strokeRect(cx - 7, yy - 7, 14, 14);
  }
  function drawWarmZone(wz) {
    const cx = px(wz.x), cy = py(wz.y, 0);
    ctx.globalAlpha = Math.min(1, wz.t / 6) * 0.35;
    const g = ctx.createRadialGradient(cx, cy, 6, cx, cy, wz.r);
    g.addColorStop(0, "rgba(255,120,40,0.8)"); g.addColorStop(1, "rgba(255,120,40,0)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(cx, cy, wz.r, wz.r * YSCALE, 0, 0, 6.3); ctx.fill();
    ctx.globalAlpha = 1;
  }
  function drawMine(m) {
    const cx = px(m.x), cy = py(m.y, 0);
    ctx.fillStyle = "#2a2a2a"; ctx.beginPath(); ctx.ellipse(cx, cy, m.r, m.r * YSCALE, 0, 0, 6.3); ctx.fill();
    ctx.fillStyle = (Math.floor(performance.now() / 300) % 2) ? "#ff3030" : "#601010";
    ctx.beginPath(); ctx.arc(cx, cy - 2, 3, 0, 6.3); ctx.fill();
  }
  function drawLava(l) {
    const cx = px(l.x), cy = py(l.y, 0), t = performance.now() / 400;
    ctx.fillStyle = "#7a1a00"; ctx.beginPath(); ctx.ellipse(cx, cy, l.r, l.r * YSCALE, 0, 0, 6.3); ctx.fill();
    ctx.fillStyle = (Math.sin(t) > 0) ? "#ff7a1a" : "#ffb24a";
    ctx.beginPath(); ctx.ellipse(cx, cy, l.r * 0.6, l.r * 0.6 * YSCALE, 0, 0, 6.3); ctx.fill();
  }
  function drawTurret(t) {
    const cx = px(t.x), gy = py(t.y, 0), by = gy - 14;
    sphere(cx, by, 13, t.ammo > 0 ? "#5a6472" : "#3a3f48");
    ctx.strokeStyle = "#cdd3dc"; ctx.lineWidth = 5; ctx.lineCap = "round";
    const fa = t.face || 0; ctx.beginPath(); ctx.moveTo(cx, by); ctx.lineTo(cx + Math.cos(fa) * 22, by + Math.sin(fa) * 22 * YSCALE); ctx.stroke();
    ctx.fillStyle = "#9fb0c8"; ctx.font = "10px sans-serif"; ctx.textAlign = "center"; ctx.fillText(t.ammo, cx, by - 18);
  }
  function drawAlly(a) {
    const cx = px(a.x), gy = py(a.y, 0), by = gy - a.r;
    sphere(cx, by, a.r, a.color);
    // weapon hint
    ctx.strokeStyle = a.kind === "melee" ? "#dfe6f0" : "#222"; ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(cx, by); ctx.lineTo(cx + Math.cos(a.face) * (a.r + 10), by + Math.sin(a.face) * (a.r + 10) * YSCALE); ctx.stroke();
    if (a.hp < a.max) { const w = 22; ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(cx - w / 2, by - a.r - 10, w, 3);
      ctx.fillStyle = "#5fd08a"; ctx.fillRect(cx - w / 2, by - a.r - 10, w * (a.hp / a.max), 3); }
  }
  function drawPlacedWall(w) {
    const x1 = w.x, y1 = w.y, x2 = w.x + w.w, y2 = w.y + w.h, h = 40;
    ctx.fillStyle = "#5a4a2a"; quad(px(x1), py(y1, h), px(x1), py(y2, h), px(x1), py(y2, 0), px(x1), py(y1, 0));
    ctx.fillStyle = "#4a3c20"; quad(px(x2), py(y1, h), px(x2), py(y2, h), px(x2), py(y2, 0), px(x2), py(y1, 0));
    ctx.fillStyle = "#3a2e18"; quad(px(x1), py(y2, h), px(x2), py(y2, h), px(x2), py(y2, 0), px(x1), py(y2, 0));
    ctx.fillStyle = "#7a6336"; quad(px(x1), py(y1, h), px(x2), py(y1, h), px(x2), py(y2, h), px(x1), py(y2, h));
    const cx = px(x1 + w.w / 2);
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(cx - 22, py(y1, h) - 8, 44, 4);
    ctx.fillStyle = "#9fd"; ctx.fillRect(cx - 22, py(y1, h) - 8, 44 * (w.hp / w.max), 4);
  }
  function drawBench(b) {
    const cx = px(b.x), gy = py(b.y, 0), by = gy - 12;
    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(cx, gy, 18, 9, 0, 0, 6.3); ctx.fill();
    ctx.fillStyle = "#6a5030"; ctx.fillRect(cx - 16, by - 10, 32, 18);
    ctx.fillStyle = "#8a6a40"; ctx.fillRect(cx - 16, by - 12, 32, 5);
    ctx.font = "13px sans-serif"; ctx.textAlign = "center"; ctx.fillText("🛠️", cx, by - 16);
  }
  function drawHireNpc(s) {
    const t = performance.now() / 1000, cx = px(s.x), gy = py(s.y, 0);
    ctx.fillStyle = "rgba(120,255,160,0.2)"; ctx.beginPath(); ctx.arc(cx, gy - 14, 24 + Math.sin(t * 3) * 3, 0, 6.3); ctx.fill();
    sphere(cx, gy - 14, 13, "#3aa05a"); sphere(cx, gy - 30, 9, "#e8c79a");
    ctx.fillStyle = "#fff"; ctx.font = "16px sans-serif"; ctx.textAlign = "center"; ctx.fillText("🧑", cx, gy - 42);
  }
  function drawPlacePreview() {
    if (!G.carried) return;
    const p = G.player, fx = p.x + Math.cos(p.ang) * 50, fy = p.y + Math.sin(p.ang) * 50;
    ctx.globalAlpha = 0.5; ctx.strokeStyle = "#9ff0a8"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(px(fx), py(fy, 0), 30, 30 * YSCALE, 0, 0, 6.3); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ---------- Flow ----------
  $("startBtn").onclick = startGame;
  $("restartBtn").onclick = () => { G.state = "title"; $("dead").hidden = true; $("title").hidden = false; };
  requestAnimationFrame(frame);
})();
</script>
</body>
